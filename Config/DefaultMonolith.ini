[/Script/MonolithCore.MonolithSettings]
; MCP server port — the embedded HTTP server listens here
ServerPort=9316

; Automatically check GitHub Releases for updates on editor startup
bAutoUpdateEnabled=False

; Override database storage path (leave empty for default: Plugins/Monolith/Saved/)
DatabasePathOverride=

; Module toggles — disable domains you don't need
bEnableBlueprint=True
bEnableMaterial=True
bEnableAnimation=True
bEnableNiagara=True
bEnableEditor=True
bEnableConfig=True
bEnableIndex=False
bEnableSource=True

; Log verbosity: 0=Silent, 1=Error, 2=Warning, 3=Log, 4=Verbose
LogVerbosity=3
